<body>

    <header>
        <h1>Contact Us</h1>
    </header>

    <nav>
        <a href="index.html">Home</a> 
        <a href="places.html">Places</a> 
        <a href="about.html">About</a> 
        <a href="gallery.html">Gallery</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <main>

        <h2>Get in Touch</h2>
        <p>Fill out the form below to contact us about travel destinations or questions.</p>


        <form id="contactForm">

            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="destination">Favorite Destination:</label><br>
            <select id="destination">
                <option>Europe</option>
                <option>Asia</option>
                <option>Africa</option>
                <option>Australia</option>
                <option>North America</option>
                <option>South America</option>
            </select><br><br>

            <label>Travel Type:</label><br>

            <div class="radio-group">
                <label>
                    <input type="radio" name="type" value="solo"> Solo
                </label>

                <label>
                    <input type="radio" name="type" value="group"> Group
                </label>
            </div>

            <label for="message">Message:</label><br>
            <textarea id="message" rows="4" cols="40"></textarea><br><br>

            <input type="submit" value="Submit">

        </form>

    </main>

    <footer>
        <p>&copy; 2026 Nicholas Brantley</p>
    </footer>

    
    <script src="js/script.js"></script>
